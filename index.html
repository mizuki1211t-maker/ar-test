<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR TEST</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

#container{
  width:100%;
  height:100%;
}

#status{
  position:fixed;
  top:15px;
  left:15px;
  background:white;
  padding:10px;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  z-index:999;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>

</head>

<body>

<div id="container"></div>
<div id="status">画像を探しています…</div>

<script type="module">

import * as THREE from "three";
import {MindARThree} from "mindar-image-three";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";

const mindarThree=new MindARThree({
    container:document.querySelector("#container"),
    imageTargetSrc:"./targets.mind"
});

const {renderer,scene,camera}=mindarThree;

const anchor=mindarThree.addAnchor(0);

anchor.onTargetFound=()=>{
    document.querySelector("#status").innerHTML="画像を見つけた！";
}

anchor.onTargetLost=()=>{
    document.querySelector("#status").innerHTML="画像を探しています…";
}


//------------------------------------
// Light
//------------------------------------

const hemi=new THREE.HemisphereLight(0xffffff,0xbbbbff,3);
scene.add(hemi);

const dir=new THREE.DirectionalLight(0xffffff,4);
dir.position.set(0,5,5);
scene.add(dir);


//------------------------------------
// Loader
//------------------------------------

loader.load("./vetnum_model_before_figure_20260625.glb", (gltf) => {

    const model = gltf.scene;

    // モデル全体の大きさ
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // 中央へ移動
    model.position.x -= center.x;
    model.position.y -= center.y;
    model.position.z -= center.z;

    // 一番大きい辺を0.3mにする
    const max = Math.max(size.x, size.y, size.z);
    const scale = 0.3 / max;
    model.scale.setScalar(scale);

    // 向き
    model.rotation.x = -Math.PI / 2;

    // 少しだけ上へ
    model.position.y += 0.15;

    anchor.group.add(model);

    console.log(box);
});

(xhr)=>{
    console.log(
        (xhr.loaded/xhr.total*100)+"%"
    );
},

(error)=>{
    console.error(error);
    document.querySelector("#status").innerHTML="モデル読み込み失敗";
}

);


//------------------------------------
// Start
//------------------------------------

await mindarThree.start();

renderer.setAnimationLoop(()=>{

    renderer.render(scene,camera);

});

</script>

</body>
</html>
