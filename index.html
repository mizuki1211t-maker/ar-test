<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR 動作テスト</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>

<body>
  <div id="container"></div>
  <div id="status">画像を探しています…</div>

  <script type="module">
    import * as THREE from "three";
    import { MindARThree } from "mindar-image-three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    // ARの基本設定
    const mindarThree = new MindARThree({
      container: document.querySelector("#container"),
      imageTargetSrc: "./targets.mind"
    });

    const { renderer, scene, camera } = mindarThree;

    // targets.mind に登録した最初の画像に反応する
    const anchor = mindarThree.addAnchor(0);

    // 画像を認識したか確認する表示
    anchor.onTargetFound = () => {
      document.querySelector("#status").textContent = "画像を見つけた！";
    };

    anchor.onTargetLost = () => {
      document.querySelector("#status").textContent = "画像を探しています…";
    };

    // モデルのアニメーション用
    const clock = new THREE.Clock();
    let mixer = null;

    // 3Dモデルを読み込む
    const loader = new GLTFLoader();

    loader.load(
      "./LittlestTokyo.glb",

      // 読み込み成功
      (gltf) => {
        const model = gltf.scene;

        // 最初は見つけやすい位置・大きさにする
        model.scale.set(0.03, 0.03, 0.03);
        model.position.set(0, 0, 0);

        // 認識画像の上に3Dモデルを置く
        anchor.group.add(model);

        // glbに入っているアニメーションを再生
        mixer = new THREE.AnimationMixer(model);

        gltf.animations.forEach((clip) => {
          mixer.clipAction(clip).play();
        });
      },

      // 読み込み中
      undefined,

      // 読み込み失敗
      (error) => {
        console.error("3Dモデルを読み込めませんでした:", error);
        document.querySelector("#status").textContent =
          "3Dモデルの読み込みに失敗しました";
      }
    );

    // モデルを明るく表示するための光
    const light = new THREE.HemisphereLight(
      0xffffff,
      0x4444ff,
      2
    );

    scene.add(light);

    // カメラを開始
    await mindarThree.start();

    // 毎フレーム描画
    renderer.setAnimationLoop(() => {
      const delta = clock.getDelta();

      if (mixer) {
        mixer.update(delta);
      }

      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
