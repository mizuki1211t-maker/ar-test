<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Human Model</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    width:100%;
    height:100%;
}

#container{
    width:100%;
    height:100%;
}

#status{
    position:fixed;
    top:20px;
    left:20px;
    background:white;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
    z-index:999;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>

</head>

<body>

<div id="container"></div>
<div id="status">画像を探しています…</div>

<script type="module">

import * as THREE from "three";
import {MindARThree} from "mindar-image-three";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";

const mindarThree=new MindARThree({
    container:document.querySelector("#container"),
    imageTargetSrc:"./targets.mind"
});

const {renderer,scene,camera}=mindarThree;

const anchor=mindarThree.addAnchor(0);

anchor.onTargetFound=()=>{
    document.getElementById("status").textContent="画像を見つけた！";
};

anchor.onTargetLost=()=>{
    document.getElementById("status").textContent="画像を探しています…";
};

// ライト
scene.add(new THREE.HemisphereLight(0xffffff,0x888888,3));

const light=new THREE.DirectionalLight(0xffffff,3);
light.position.set(0,2,2);
scene.add(light);

// モデル読み込み
const loader=new GLTFLoader();

loader.load(
"./vetnum_model_before_figure_20260625.glb",

(gltf)=>{

    const model=gltf.scene;

    // バウンディングボックス
    const box=new THREE.Box3().setFromObject(model);

    const size=box.getSize(new THREE.Vector3());

    const center=box.getCenter(new THREE.Vector3());

    // モデル中心へ
    model.position.x=-center.x;
    model.position.y=-center.y;
    model.position.z=-center.z;

    // 最大サイズを0.25mに
    const max=Math.max(size.x,size.y,size.z);

    const scale=0.25/max;

    model.scale.set(scale,scale,scale);

    // Blender→Three.js
    model.rotation.x=-Math.PI/2;

    // 少し持ち上げる
    model.position.y+=0.05;

    anchor.group.add(model);

    console.log("読み込み成功");
},

undefined,

(error)=>{
    console.error(error);
    document.getElementById("status").textContent="モデル読み込み失敗";
}

);

await mindarThree.start();

renderer.setAnimationLoop(()=>{
    renderer.render(scene,camera);
});

</script>

</body>
</html>
